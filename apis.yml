apis:
  - name: Amazon GuardDuty API
    description: >-
      The Amazon GuardDuty API enables programmatic access to manage threat
      detection across your AWS accounts. You can create and manage detectors,
      configure threat intelligence feeds, manage findings, set up member
      accounts, and create IP sets and threat intelligence lists.
