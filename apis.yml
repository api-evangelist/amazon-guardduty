name: Amazon GuardDuty
description: >-
  Amazon GuardDuty is an intelligent threat detection service that
  continuously monitors your AWS accounts, workloads, and data for malicious
  activity. It uses machine learning, anomaly detection, and integrated
  threat intelligence to identify and prioritize potential threats to your
  AWS environment.
